# VERIFIED compose sketch (spike 002). Structure from open-webui/pipelines README,
# extended for our case: OpenWebUI + pipelines + a shared analysis/REST service.
# NOTE: OpenWebUI connects to the *pipelines* server as its OpenAI backend.
#       The pipeline code then calls Groq itself (via valves) for the 4 agents.
services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      # Auto-register the pipelines server as an OpenAI connection (no manual UI step):
      - OPENAI_API_BASE_URL=http://pipelines:9099
      - OPENAI_API_KEY=0p3n-w3bu!
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - pipelines

  pipelines:
    build: ./            # our image: base ghcr.io/open-webui/pipelines:main + faster-whisper, agents
    # image: ghcr.io/open-webui/pipelines:main   # (stock, if no extra deps)
    environment:
      - PIPELINES_API_KEY=0p3n-w3bu!
      # LLM for agents (Groq) — also settable live via Valves in Admin > Pipelines:
      - LLM_BASE_URL=https://api.groq.com/openai/v1
      - LLM_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=llama-3.3-70b-versatile
      - WHISPER_MODEL=small
    volumes:
      - pipelines:/app/pipelines
    restart: always

  # REST POST /analyze — shares the SAME asr/ + agents/ python modules as the pipeline.
  api:
    build: ./
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      - LLM_BASE_URL=https://api.groq.com/openai/v1
      - LLM_API_KEY=${GROQ_API_KEY}
      - WHISPER_MODEL=small
    ports:
      - "8000:8000"

volumes:
  open-webui: {}
  pipelines: {}
