# Single entrypoint for the Cloudflare Tunnel: it can only publish ONE port.
# REST paths -> FastAPI (8000); everything else -> OpenWebUI (8080). Same split as prod Caddy.
server {
    listen 80;
    server_name _;
    client_max_body_size 100M;          # audio uploads to /analyze

    # nginx resolves an upstream ONCE at startup and caches the IP forever. Recreating the `api`
    # container hands it a new address in the compose network, and the proxy then 502s silently.
    # Pointing at docker's embedded DNS AND passing the upstream through a variable forces a
    # re-resolve per request, so a restarted service is picked up automatically.
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $api_upstream       http://api:8000;
    set $openwebui_upstream http://openwebui:8080;
    set $grafana_upstream   http://grafana:3000;

    location = /health       { proxy_pass $api_upstream; }
    location = /analyze      { proxy_pass $api_upstream; }
    location = /docs         { proxy_pass $api_upstream; }
    location = /openapi.json { proxy_pass $api_upstream; }

    # BONUS-B-GRAFANA-tunnel: grafana runs behind the compose "metrics" profile and is often
    # absent (plain `docker compose up -d` never starts it). Routing through a resolved variable
    # (same re-resolve pattern as above) means an absent grafana just 502s on this location instead
    # of nginx refusing to start — DO NOT add `depends_on: grafana` to this service, it would break
    # `docker compose up -d` without the metrics profile. Grafana's GF_SERVER_SERVE_FROM_SUB_PATH
    # makes it emit relative asset paths anchored by <base href="/grafana/">, so the trailing
    # slash below is load-bearing but the request is otherwise passed through unchanged.
    location /grafana/ {
        proxy_pass $grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # Grafana Live uses websockets (/grafana/api/live/ws)
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass $openwebui_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # OpenWebUI uses websockets
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
