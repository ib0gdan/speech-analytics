# Single entrypoint for the Cloudflare Tunnel: it can only publish ONE port.
# REST paths -> FastAPI (8000); everything else -> OpenWebUI (8080). Same split as prod Caddy.
server {
    listen 80;
    server_name _;
    client_max_body_size 100M;          # audio uploads to /analyze

    location = /health       { proxy_pass http://api:8000; }
    location = /analyze      { proxy_pass http://api:8000; }
    location = /docs         { proxy_pass http://api:8000; }
    location = /openapi.json { proxy_pass http://api:8000; }

    location / {
        proxy_pass http://openwebui:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # OpenWebUI uses websockets
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
