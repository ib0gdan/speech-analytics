# Single public port 7860. REST paths -> FastAPI (8000); everything else -> OpenWebUI (8080).
server {
    listen 7860;
    server_name _;
    client_max_body_size 100M;          # allow audio uploads to /analyze

    # --- REST API (FastAPI) ---
    location = /health          { proxy_pass http://127.0.0.1:8000; }
    location = /docs            { proxy_pass http://127.0.0.1:8000; }
    location = /openapi.json    { proxy_pass http://127.0.0.1:8000; }
    # Prefix (not exact) so /analyze AND /analyze-batch both reach the api. An exact `= /analyze`
    # silently drops /analyze-batch to the OpenWebUI catch-all, which 405s. OpenWebUI has no route
    # under /analyze, so a prefix is safe here.
    location /analyze           { proxy_pass http://127.0.0.1:8000; }

    # Serve the bundled sample recordings so the demo is self-contained: in chat, paste
    # `<space-url>/files/call_dialog.mp3`. The pipeline fetches it back over this same origin.
    location /files/ {
        alias /opt/app/test_data/;
        autoindex on;
    }

    # --- OpenWebUI (chat UI + its backend, incl. websockets/socket.io) ---
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
