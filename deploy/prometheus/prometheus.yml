# Two scrape targets — api (REST path) and pipelines (chat path) run separate processes with
# separate in-memory registries (single uvicorn worker each, no pushgateway/multiprocess mode).
# The dashboard sums across both so it shows the true chat+REST total (design A).
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: mtbank-api
    static_configs:
      - targets: ["api:8000"]

  - job_name: mtbank-pipelines
    static_configs:
      - targets: ["pipelines:9100"]
