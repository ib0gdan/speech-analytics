# Local dev stack for MTBank Call Analytics — Phase 1 (skeleton).
# `docker compose up -d` brings up OpenWebUI + the external Pipelines server + the REST API.
# OpenWebUI is pre-wired to the pipelines server as its OpenAI backend (no manual UI step).
# The Pipeline and the API share the same mtbank/ core (no duplicated logic).
services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: mtbank-openwebui
    ports:
      - "3000:8080"                       # open http://localhost:3000
    environment:
      - WEBUI_AUTH=False                  # local convenience: skip login for the demo
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URL=http://pipelines:9099   # pipelines server = the "OpenAI" backend
      - OPENAI_API_KEY=${PIPELINES_API_KEY:-0p3n-w3bu!}
      # Trim ~1 GiB: OpenWebUI otherwise loads torch + two local embedding models for document
      # RAG and its own whisper for voice input. We use none of that — our ASR is in `pipelines`.
      - RAG_EMBEDDING_ENGINE=openai
      - AUDIO_STT_ENGINE=openai
      - ENABLE_OLLAMA_API=false
      - OLLAMA_BASE_URL=            # silence retries to a host we don't run
      - RAG_EMBEDDING_MODEL_AUTO_UPDATE=false
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      - pipelines
    restart: unless-stopped

  pipelines:
    build:
      context: .
      dockerfile: Dockerfile.pipelines    # stock image + faster-whisper baked in
    container_name: mtbank-pipelines
    ports:
      - "9099:9099"
    environment:
      - PIPELINES_API_KEY=${PIPELINES_API_KEY:-0p3n-w3bu!}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_BASE_URL=https://api.groq.com/openai/v1
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - HF_HOME=/models
      - PYTHONUNBUFFERED=1               # otherwise on_startup prints never reach docker logs
    volumes:
      - ./pipelines:/app/pipelines        # our pipeline entrypoints load from here
      - ./mtbank:/app/mtbank:ro           # shared core, importable as `mtbank`
      - whisper-models:/models            # model cache survives restarts
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mtbank-api
    ports:
      - "8000:8000"                       # REST: http://localhost:8000  (POST /analyze, GET /health)
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_BASE_URL=https://api.groq.com/openai/v1
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - HF_HOME=/models
      - PYTHONUNBUFFERED=1
    volumes:
      - whisper-models:/models            # model cache shared with pipelines, survives restarts
      - ./mtbank:/app/mtbank              # live-edit core without rebuild
      - ./api:/app/api
      - ./tests:/app/tests                # `docker compose exec api pytest`
      - ./test_data:/app/test_data        # fixtures for the slow real-ASR test
      - ./scripts:/app/scripts:ro         # eval_wer.py etc, always current
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Serves test_data/ so a call recording has a URL the pipelines container can fetch.
  # In the chat use  http://files/call_dialog.mp3  (resolved on the compose network).
  # From your machine the same files are at  http://localhost:8899/call_dialog.mp3
  files:
    image: nginx:alpine
    container_name: mtbank-files
    ports:
      - "8899:80"
    volumes:
      - ./test_data:/usr/share/nginx/html:ro
    restart: unless-stopped

  # One public port for the Cloudflare Tunnel (which can publish only one).
  # Chat and REST behind a single origin, mirroring the prod Caddy split.
  proxy:
    image: nginx:alpine
    container_name: mtbank-proxy
    ports:
      - "8080:80"
    volumes:
      - ./deploy/local/nginx-tunnel.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - openwebui
      - api
    restart: unless-stopped

  # Opt-in observability stack (BONUS-B-METRICS). `profiles: ["metrics"]` on BOTH services
  # keeps plain `docker compose up -d` at today's footprint — bring these up explicitly with
  # `docker compose --profile metrics up -d --build`. Not present in docker-compose.prod.yml:
  # Grafana never rides on the 2 GB VPS deploy.
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: mtbank-prometheus
    profiles: ["metrics"]
    ports:
      - "9090:9090"                      # inspect scrape targets: http://localhost:9090/targets
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: mtbank-grafana
    profiles: ["metrics"]
    ports:
      - "3001:3000"                      # host 3000 is taken by openwebui
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true   # anonymous read-only viewer for the demo (T-nc0-02)
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # Exposed at /grafana/ through the tunnel proxy (BONUS-B-GRAFANA-tunnel). Grafana then emits
      # <base href="/grafana/"> plus relative asset paths, so every asset anchors under
      # /grafana/public/... regardless of the Host header the tunnel forwards (proven live: a
      # foreign Host still renders 200 with zero bare /public/ refs). The root_url HOST below is
      # therefore cosmetic — it is only used for the bare-`/` redirect, which the tunnel never
      # routes to Grafana (nginx sends bare `/` to OpenWebUI). 3001 is the host-mapped direct port,
      # so a stale bare :3001/ bookmark self-heals via a 301 to :3001/grafana/.
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_ROOT_URL=http://localhost:3001/grafana/
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  openwebui-data: {}
  whisper-models: {}
  prometheus-data: {}
  grafana-data: {}
